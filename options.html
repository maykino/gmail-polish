<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gmail Polish Settings</title>
    <style>
      :root {
        --bg: #f8f9fa;
        --panel: #ffffff;
        --text: #202124;
        --muted: #5f6368;
        --accent: #1a73e8;
        --accent-hover: #1557b0;
        --border: #dadce0;
        --success: #137333;
        --error: #b3261e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 760px;
        margin: 32px auto;
        padding: 0 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .field {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      button {
        border: none;
        border-radius: 18px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      #save {
        background: var(--accent);
        color: #fff;
      }

      #save:hover {
        background: var(--accent-hover);
      }

      #test {
        background: #e8eaed;
        color: #202124;
      }

      #status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
      }

      #status.success {
        color: var(--success);
      }

      #status.error {
        color: var(--error);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <h1>Gmail Polish Settings</h1>
        <p>Configure your OpenAI-compatible endpoint and model.</p>

        <div class="field">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="openai">OpenAI API</option>
            <option value="local">Local Server</option>
          </select>
        </div>

        <div class="field">
          <label for="apiUrl">API URL</label>
          <input id="apiUrl" type="url" placeholder="https://api.openai.com/v1/chat/completions" />
          <div class="hint">For local provider, use your OpenAI-compatible endpoint.</div>
        </div>

        <div class="field">
          <label for="apiKey">API Key</label>
          <input id="apiKey" type="password" autocomplete="off" />
        </div>

        <div class="field">
          <label for="model">Model</label>
          <input id="model" type="text" placeholder="gpt-4.1" />
        </div>

        <div class="field">
          <label for="customInstructions">Custom Instructions</label>
          <textarea
            id="customInstructions"
            placeholder="Optional style instructions, e.g. Keep it concise and friendly."
          ></textarea>
        </div>

        <div class="buttons">
          <button id="save" type="button">Save</button>
          <button id="test" type="button">Test Connection</button>
        </div>

        <div id="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
